<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page.title }}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #05070b;
      --panel: #0b0f17;
      --panel-2: #0f1420;
      --text: #eef2ff;
      --muted: #95a0be;
      --line: #1b2333;
      --accent: #b48cff;
      --accent-2: #8b5cf6;
      --maxw: 860px;
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.8 "IBM Plex Mono", monospace;
      padding: 40px 20px 64px;
    }

    .wrap {
      max-width: var(--maxw);
      margin: 0 auto;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 18px;
      color: var(--muted);
      text-decoration: none;
    }

    .back-link:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    .post-shell {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .post-hero {
      padding: 28px 28px 22px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(180, 140, 255, 0.06), rgba(180, 140, 255, 0.02)),
        var(--panel);
    }

    .post-kicker {
      color: var(--accent);
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .post-title {
      margin: 0;
      font-size: 2rem;
      line-height: 1.2;
      color: var(--text);
    }

    .post-meta {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .post-body {
      padding: 28px;
    }

    .post-body h1 {
      font-size: 1.45rem;
      margin: 2rem 0 0.8rem;
      color: var(--text);
    }

    .post-body h2 {
      font-size: 1.2rem;
      margin: 1.8rem 0 0.7rem;
      color: var(--text);
    }

    .post-body h3 {
      font-size: 1.05rem;
      margin: 1.5rem 0 0.6rem;
      color: var(--text);
    }

    .post-body p,
    .post-body li {
      color: var(--text);
    }

    .post-body p {
      margin: 0 0 1rem;
    }

    .post-body ul,
    .post-body ol {
      margin: 0 0 1.2rem 1.4rem;
      padding: 0;
    }

    .post-body li {
      margin-bottom: 0.45rem;
    }

    .post-body a {
      color: var(--accent);
      text-decoration: none;
    }

    .post-body a:hover {
      color: var(--accent-2);
      text-decoration: underline;
    }

    .post-body code {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0.15rem 0.4rem;
      color: #dcc8ff;
      font: 0.95rem "IBM Plex Mono", monospace;
    }

    .post-body pre {
      background: #070a11;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 16px;
      overflow-x: auto;
      margin: 1.2rem 0;
    }

    .post-body pre code {
      background: transparent;
      border: 0;
      padding: 0;
      color: #e8ecff;
    }

    .post-body blockquote {
      margin: 1.2rem 0;
      padding: 0.3rem 0 0.3rem 1rem;
      border-left: 3px solid var(--accent);
      color: var(--muted);
      background: rgba(180, 140, 255, 0.05);
    }

    .post-body hr {
      border: 0;
      border-top: 1px solid var(--line);
      margin: 2rem 0;
    }

    .post-body img {
      max-width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      display: block;
      margin: 1.2rem 0;
    }

    .post-body strong {
      color: #ffffff;
    }

    @media (max-width: 640px) {
      body {
        padding: 20px 14px 40px;
      }

      .post-hero,
      .post-body {
        padding: 20px;
      }

      .post-title {
        font-size: 1.55rem;
      }

      .post-body h1 {
        font-size: 1.25rem;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back-link" href="/#blog">← back to site</a>

    <article class="post-shell">
      <header class="post-hero">
        <div class="post-kicker">Blog / Notes</div>
        <h1 class="post-title">{{ page.title }}</h1>
        <div class="post-meta">
          {{ page.date | date: "%B %-d, %Y" }}
        </div>
      </header>

      <section class="post-body">
        {{ content }}
      </section>
    </article>
  </div>
</body>
</html>
