<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page.title }}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #05070b;
      --panel: #0b0f17;
      --panel-2: #0f1420;
      --text: #eef2ff;
      --muted: #95a0be;
      --line: #1b2333;
      --accent: #b48cff;
      --accent-2: #8b5cf6;
      --maxw: 860px;
      --radius: 0px;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
    }

    html[data-theme="light"] {
      --bg: #f7f5ff;
      --panel: #ffffff;
      --panel-2: #f3efff;
      --text: #161320;
      --muted: #6f6787;
      --line: #ddd4f3;
      --accent: #7c3aed;
      --accent-2: #5b21b6;
      --shadow: 0 10px 30px rgba(80, 48, 140, 0.08);
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.8 "IBM Plex Mono", monospace;
      padding: 40px 20px 64px;
      transition: background-color 0.25s ease, color 0.25s ease;
    }

    .wrap {
      max-width: var(--maxw);
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }

    .back-link {
      display: inline-block;
      color: var(--muted);
      text-decoration: none;
    }

    .back-link:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    .theme-toggle {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 0;
      padding: 0.55rem 0.9rem;
      font: 0.85rem "IBM Plex Mono", monospace;
      cursor: pointer;
      transition: background-color 0.25s ease, color 0.25s ease, border-color 0.25s ease, transform 0.15s ease;
      box-shadow: var(--shadow);
    }

    .theme-toggle:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .theme-toggle:active {
      transform: translateY(1px);
    }

    .post-shell {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: background-color 0.25s ease, border-color 0.25s ease;
    }

    .post-hero {
      padding: 28px 28px 22px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(180, 140, 255, 0.07), rgba(180, 140, 255, 0.02)),
        var(--panel);
      transition: border-color 0.25s ease, background-color 0.25s ease;
    }

    .post-kicker {
      color: var(--accent);
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .post-title {
      margin: 0;
      font-size: 2rem;
      line-height: 1.2;
      color: var(--text);
    }

    .post-meta {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .post-body {
      padding: 28px;
    }

    .post-body h1 {
      font-size: 1.45rem;
      margin: 2rem 0 0.8rem;
      color: var(--text);
    }

    .post-body h2 {
      font-size: 1.2rem;
      margin: 1.8rem 0 0.7rem;
      color: var(--text);
    }

    .post-body h3 {
      font-size: 1.05rem;
      margin: 1.5rem 0 0.6rem;
      color: var(--text);
    }

    .post-body p,
    .post-body li {
      color: var(--text);
    }

    .post-body p {
      margin: 0 0 1rem;
    }

    .post-body ul,
    .post-body ol {
      margin: 0 0 1.2rem 1.4rem;
      padding: 0;
    }

    .post-body li {
      margin-bottom: 0.45rem;
    }

    .post-body a {
      color: var(--accent);
      text-decoration: none;
    }

    .post-body a:hover {
      color: var(--accent-2);
      text-decoration: underline;
    }

    .post-body code {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 0px;
      padding: 0.15rem 0.4rem;
      color: var(--accent-2);
      font: 0.95rem "IBM Plex Mono", monospace;
    }

    .post-body pre {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 0px;
      padding: 16px;
      overflow-x: auto;
      margin: 1.2rem 0;
    }

    .post-body pre code {
      background: transparent;
      border: 0;
      padding: 0;
      color: var(--text);
    }

    .post-body blockquote {
      margin: 1.2rem 0;
      padding: 0.3rem 0 0.3rem 1rem;
      border-left: 3px solid var(--accent);
      color: var(--muted);
      background: rgba(180, 140, 255, 0.05);
    }

    .post-body hr {
      border: 0;
      border-top: 1px solid var(--line);
      margin: 2rem 0;
    }

    .post-body img {
      max-width: 100%;
      border-radius: 0px;
      border: 1px solid var(--line);
      display: block;
      margin: 1.2rem 0;
    }

    .post-body strong {
      color: var(--text);
    }

    @media (max-width: 640px) {
      body {
        padding: 20px 14px 40px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .post-hero,
      .post-body {
        padding: 20px;
      }

      .post-title {
        font-size: 1.55rem;
      }

      .post-body h1 {
        font-size: 1.25rem;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="back-link" href="/#blog">← back to site</a>
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Switch to light mode">
        LIGHT MODE
      </button>
    </div>

    <article class="post-shell">
      <header class="post-hero">
        <div class="post-kicker">Blog / Notes</div>
        <h1 class="post-title">{{ page.title }}</h1>
        <div class="post-meta">
          {{ page.date | date: "%B %-d, %Y" }}
        </div>
      </header>

      <section class="post-body">
        {{ content }}
      </section>
    </article>
  </div>

  <script>
    (function () {
      const root = document.documentElement;
      const btn = document.getElementById("theme-toggle");
      const saved = localStorage.getItem("post-theme");

      if (saved === "light" || saved === "dark") {
        root.setAttribute("data-theme", saved);
      }

      function updateButton() {
        const current = root.getAttribute("data-theme") || "dark";
        if (current === "light") {
          btn.textContent = "DARK MODE";
          btn.setAttribute("aria-label", "Switch to dark mode");
        } else {
          btn.textContent = "LIGHT MODE";
          btn.setAttribute("aria-label", "Switch to light mode");
        }
      }

      btn.addEventListener("click", function () {
        const current = root.getAttribute("data-theme") || "dark";
        const next = current === "dark" ? "light" : "dark";
        root.setAttribute("data-theme", next);
        localStorage.setItem("post-theme", next);
        updateButton();
      });

      updateButton();
    })();
  </script>
</body>
</html>
